name: Update Homebrew cask

on:
  release:
    types: [published]

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${VERSION#v}"
          ASSET_URL="https://github.com/amenocturne/mic-mixer/releases/download/v${VERSION}/MicMixer.app.zip"
          SHA256=$(curl -sL "$ASSET_URL" | shasum -a 256 | awk '{print $1}')

          git clone https://x-access-token:${TAP_TOKEN}@github.com/amenocturne/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/micmixer.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/micmixer.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/micmixer.rb
          git commit -m "Update micmixer to ${VERSION}"
          git push
